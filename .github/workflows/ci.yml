name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore MediaToolsNext.slnx

      - name: Test core and infrastructure
        run: dotnet test tests\MediaToolsNext.Tests\MediaToolsNext.Tests.csproj --no-restore

      - name: Test desktop state
        run: dotnet test tests\MediaToolsNext.Desktop.Tests\MediaToolsNext.Desktop.Tests.csproj --no-restore

      - name: Build CLI
        run: dotnet build src\MediaToolsNext.Cli\MediaToolsNext.Cli.csproj --no-restore

      - name: Build infrastructure
        run: dotnet build src\MediaToolsNext.Infrastructure\MediaToolsNext.Infrastructure.csproj --no-restore

      - name: Build Windows desktop
        run: dotnet build src\MediaToolsNext.Desktop\MediaToolsNext.Desktop.csproj -f net10.0-windows10.0.19041.0 --no-restore
